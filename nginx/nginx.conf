events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  gzip          on;
  gzip_types    text/plain text/css application/json application/javascript text/xml application/xml;
  client_max_body_size 60M;

  # ── 用户端（主站）────────────────────────────────
  server {
    listen 80;
    server_name _;

    # 静态上传文件
    location /uploads/ {
      alias /var/www/uploads/;
      expires 30d;
      add_header Cache-Control "public, immutable";
      add_header X-Content-Type-Options "nosniff";

      # PDF/Word 等文件强制内联显示，防止浏览器触发下载
      location ~* \.(pdf)$ {
        alias /var/www/uploads/;
        add_header Content-Disposition "inline";
        add_header Content-Type "application/pdf";
        add_header Cache-Control "public, max-age=2592000";
      }
    }

    # API 跨域（管理后台 8073 跨域访问）
    location /api/ {
      # 屏蔽 Nuxt 自带的 CORS 头，避免重复
      proxy_hide_header access-control-allow-origin;
      proxy_hide_header access-control-allow-methods;
      proxy_hide_header access-control-allow-headers;
      proxy_hide_header access-control-max-age;

      add_header Access-Control-Allow-Origin $http_origin always;
      add_header Access-Control-Allow-Credentials true always;
      add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
      add_header Access-Control-Allow-Headers 'Authorization,Content-Type,Accept,X-Request-Id,apifoxToken' always;

      if ($request_method = OPTIONS) {
        return 204;
      }

      proxy_pass http://edu-nuxt:3000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Nuxt 前端
    location / {
      proxy_pass http://edu-nuxt:3000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_cache_bypass $http_upgrade;
    }
  }
}
